[[redirects]]
  from = "http://v2archdesign.com/*"
  to = "https://v2archdesign.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.v2archdesign.com/*"
  to = "https://v2archdesign.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.v2archdesign.com/*"
  to = "https://v2archdesign.com/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
